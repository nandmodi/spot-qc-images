<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Spyne QC</title>
<link rel="icon" href="https://spyne-prod-ai.s3.us-east-1.amazonaws.com/ai-dataset/2025/logo/unnamed.png"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg0:#D6E8FA; --bg1:#FFFFFF; --bg2:#F7F8FA; --bg3:#EEF0F4; --bg4:#E5E7EC;
  --line:#E2E5EB; --line2:#CDD1DA; --accent:#2563EB; --accent2:#1D4ED8;
  --accentg:rgba(37,99,235,.1); --accentlt:#EFF6FF; --ok:#16A34A;
  --okg:rgba(22,163,74,.1); --oklt:#F0FDF4; --warn:#D97706; --warnlt:#FFFBEB;
  --danger:#DC2626; --dangerg:rgba(220,38,38,.08); --dangerlt:#FEF2F2;
  --t1:#0F1523; --t2:#374151; --t3:#6B7280; --t4:#9CA3AF; --r:8px; --rlg:12px;
  --mono:'IBM Plex Mono',monospace; --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 1px 4px rgba(0,0,0,.04);
  --shadow-lg:0 12px 40px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg0);color:var(--t1);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}
.hidden{display:none!important}

/* ── ANIMATIONS ── */
@keyframes shimmer{0%{background-position:-800px 0}100%{background-position:800px 0}}
@keyframes tIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:none}}
@keyframes tOut{to{opacity:0;transform:translateX(-12px)}}
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes rot{to{transform:rotate(360deg)}}

/* ── LOGIN ── */
#loginPage{height:100%;display:flex;align-items:center;justify-content:center;background:var(--bg0)}
.login-card{width:390px;background:var(--bg1);border:1px solid var(--line);border-radius:var(--rlg);padding:44px 40px 38px;box-shadow:var(--shadow-lg);animation:slideUp .35s cubic-bezier(.22,.68,0,1.2) both}
.login-h{font-size:20px;font-weight:800;letter-spacing:-.03em;margin-bottom:4px;color:#000}
.login-sub{font-size:13px;color:var(--t3);margin-bottom:28px}
.field+.field{margin-top:15px}
.field-lbl{font-size:12px;font-weight:500;color:var(--t2);margin-bottom:5px;display:block}
.field-in{width:100%;height:40px;padding:0 12px;background:var(--bg1);border:1px solid var(--line2);border-radius:var(--r);font-family:'Inter',sans-serif;font-size:14px;color:var(--t1);outline:none;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none}
.field-in:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accentg)}
.login-err{display:none;margin-top:14px;padding:10px 12px;background:var(--dangerlt);border:1px solid #FCA5A5;border-radius:var(--r);font-size:13px;color:var(--danger)}
.btn-login{width:100%;height:42px;background:var(--accent);color:#fff;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;border:none;border-radius:var(--r);cursor:pointer;transition:background .15s,box-shadow .15s,transform .1s;letter-spacing:.01em}
.btn-login:hover{background:var(--accent2);box-shadow:0 4px 16px rgba(37,99,235,.35)}

/* ── APP SHELL ── */
#app{display:none;flex-direction:column;height:100vh}
.topbar{height:52px;background:var(--bg1);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 18px;gap:8px;flex-shrink:0;z-index:30;box-shadow:var(--shadow)}
.t-logo-img{height:28px; width:auto; display:block; margin-right:8px;}
.mode-group{display:flex;background:var(--bg0);border:1px solid var(--line);border-radius:var(--r);padding:3px;gap:2px}
.mode-pill{font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:4px 13px;border:none;border-radius:6px;background:transparent;color:var(--t3);cursor:pointer;transition:all .14s;white-space:nowrap}
.mode-pill.on{background:var(--bg1);color:var(--accent);font-weight:600;box-shadow:var(--shadow)}
.t-space{flex:1}
.t-chip{font-family:var(--mono);font-size:11px;color:var(--t3);background:var(--bg2);border:1px solid var(--line);border-radius:5px;padding:3px 9px;white-space:nowrap}
.t-chip.done-count{background:var(--oklt);color:var(--ok);border-color:var(--ok);font-weight:700}
.t-avatar{width:28px;height:28px;background:var(--accentlt);border:1.5px solid var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--accent);flex-shrink:0}
.t-uname{font-size:13px;font-weight:500;color:var(--t2)}
.btn-sm{font-family:'Inter',sans-serif;font-size:12px;font-weight:500;background:transparent;border:1px solid var(--line2);border-radius:6px;color:var(--t3);padding:0 11px;height:28px;cursor:pointer;transition:all .14s}

/* ── SETUP PAGE ── */
#setupPage{flex:1;display:flex;flex-direction:column;overflow:hidden}
.filter-bar{background:var(--bg1);border-bottom:1px solid var(--line);padding:10px 18px;display:flex;align-items:center;flex-wrap:wrap;gap:8px;flex-shrink:0}
.fi-sel{font-family:'Inter',sans-serif;font-size:12.5px;color:var(--t1);background:var(--bg2);border:1px solid var(--line);border-radius:6px;padding:5px 10px;outline:none;cursor:pointer}
.btn-start{font-family:'Inter',sans-serif;font-size:13px;font-weight:600;background:var(--accent);color:#fff;border:none;border-radius:var(--r);padding:0 18px;height:34px;cursor:pointer;transition:background .14s}

/* ── DATA LOADER ── */
.load-strip{display:none;align-items:center;gap:10px;padding:9px 18px;background:var(--accentlt);border-bottom:1px solid var(--line);font-size:12.5px;font-weight:500;color:var(--accent);flex-shrink:0}
.spin{width:14px;height:14px;border:2px solid var(--line2);border-top-color:var(--accent);border-radius:50%;animation:rot .7s linear infinite;flex-shrink:0}

/* ── REVIEW PAGE ── */
#reviewPage{display:none;flex-direction:column;flex:1;overflow:hidden;min-height:0}
.rev-top{background:var(--bg1);border-bottom:1px solid var(--line);padding:0 18px;display:flex;align-items:stretch;overflow-x:auto;flex-shrink:0}
.rmc{padding:9px 18px 9px 0;border-right:1px solid var(--line);margin-right:18px;flex-shrink:0;min-width:0;max-width:260px}
.rmc-l{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#000;margin-bottom:2px}
.rmc-v{font-family:var(--mono);font-size:11.5px;color:var(--t2);font-weight:400;overflow:hidden;text-overflow:ellipsis}

.prog-row{background:var(--bg2);border-bottom:1px solid var(--line);padding:6px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.prog-track{flex:1;max-width:280px;height:4px;background:var(--line);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);transition:width .4s ease}

.img-area{flex:1;display:grid;grid-template-columns:repeat(3,1fr);overflow:hidden;min-height:0}
.img-area.two-col{grid-template-columns:1fr 1fr}
.img-panel{position:relative;display:flex;flex-direction:column;background:#1A1C23;overflow:hidden;border-right:1px solid #2A2D38}
.img-panel img{width:100%;height:100%;object-fit:contain;display:block;opacity:0;transition:opacity .2s ease;position:absolute;inset:0}
.img-panel img.loaded{opacity:1}
.img-label{position:absolute;top:10px;left:10px;z-index:5;font-size:10.5px;font-weight:600;text-transform:uppercase;background:rgba(255,255,255,0.88);padding:3px 9px;border-radius:5px}

.rev-footer{background:var(--bg1);border-top:1px solid var(--line);padding:12px 18px;display:flex;align-items:flex-end;gap:10px;flex-shrink:0}
.issue-checkboxes{display:flex;flex-wrap:wrap;gap:6px 14px;align-items:center}
.issue-cb-row{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:500;color:var(--t2);cursor:pointer;padding:4px 8px;border-radius:6px;border:1px solid var(--line);background:var(--bg2);transition:background 0.2s}
.issue-cb-row:has(.issue-cb:checked){background:var(--dangerlt);border-color:#FCA5A5;color:var(--danger);font-weight:600}
.issue-cb-row.done-row:has(.issue-cb:checked){background:var(--oklt);border-color:var(--ok);color:var(--ok)}
.issue-cb{display:none}
.issue-cb-num{font-family:var(--mono);font-size:9.5px;font-weight:700;background:var(--bg4);border-radius:3px;padding:1px 4px;color:var(--t3);line-height:1}
.issue-cb-row:has(.issue-cb:checked) .issue-cb-num{background:var(--danger);color:#fff}
.issue-cb-row.done-row:has(.issue-cb:checked) .issue-cb-num{background:var(--ok);color:#fff}

.btn-sub{font-family:'Inter',sans-serif;font-size:13px;font-weight:600;background:var(--ok);color:#fff;border:none;border-radius:var(--r);padding:0 20px;height:38px;cursor:pointer}
.btn-sub:disabled{background:var(--line2);cursor:not-allowed;color:var(--t3)}
.btn-prev{font-family:'Inter',sans-serif;font-size:13px;font-weight:500;background:var(--bg1);border:1px solid var(--line2);padding:0 16px;height:38px;border-radius:var(--r);cursor:pointer}

.toast-shelf{position:fixed;bottom:18px;left:18px;z-index:999;display:flex;flex-direction:column;gap:7px}
.toast{background:var(--bg1);border:1px solid var(--line);border-radius:var(--r);padding:10px 14px;font-size:12.5px;box-shadow:var(--shadow-md);display:flex;align-items:center;gap:8px;animation:tIn .22s ease both}
.toast.ok{border-left:3px solid var(--ok)}
.toast.err{border-left:3px solid var(--danger)}
.toast.warn{border-left:3px solid var(--warn)}

#paceFlash{display:none;position:fixed;inset:0;z-index:500;background:rgba(220,38,38,0.08);pointer-events:none}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-card">
    <img src="https://spyne-prod-ai.s3.us-east-1.amazonaws.com/ai-dataset/2025/download.jpeg" style="height:38px; width:auto; margin-bottom:28px; display:block;" alt="Spyne Logo">

        <option>Praveen Agarwal</option><option>Raj Tripathi</option><option>Rohit Chauhan</option><option>Ajay Devrani</option>

    </div>
    <div class="field">
      <label class="field-lbl">Password</label>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <img src="https://spyne-prod-ai.s3.us-east-1.amazonaws.com/ai-dataset/2025/download.jpeg" class="t-logo-img" alt="Spyne">
    <div class="t-space"></div>
    <div class="mode-group">

  <div id="setupPage">

    <div class="load-strip" id="loadStrip">

    </div>

  <div id="reviewPage">

      <div class="rmc"><div class="rmc-l">SKU</div><div class="rmc-v" id="mSku">-</div></div>

          <label class="issue-cb-row"><input type="checkbox" class="issue-cb" id="cb2" value="See-through int"><span class="issue-cb-num">2</span>See-through int</label>

<div class="toast-shelf" id="toastShelf"></div>

<script>
const QC_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSWW7muoNyeY_1VOLhybuT7ChNHtkhAscxDikyiCPQChIWqi1m3KXsd9e0_i_UFE7bDrW_7kfH-vIhL/pub?gid=1717039169&single=true&output=csv";
const EDIT_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSWW7muoNyeY_1VOLhybuT7ChNHtkhAscxDikyiCPQChIWqi1m3KXsd9e0_i_UFE7bDrW_7kfH-vIhL/pub?gid=320301246&single=true&output=csv";
// NEW: Data source for counting done items
const DONE_COUNT_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSWW7muoNyeY_1VOLhybuT7ChNHtkhAscxDikyiCPQChIWqi1m3KXsd9e0_i_UFE7bDrW_7kfH-vIhL/pub?gid=2128295653&single=true&output=csv";
const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSdrjhynjWITfOqHpkgKX8enCmDKg1b3s0Ij05Cux36kPmZEUA/formResponse";

const PROXY = "https://media.spyneai.com/unsafe/0x0/filters:format(webp)/";

const FMAP = {
  qc: { enterprise:'enterprise_name', image_id:'ai.image_id', sku_id:'sku_id', left:'input_image_hres_url', mid:'output_image_hres_url', right:'manual_image_hres_url', user:'qc_user_name', editor:'', fqc:'', lqc:'', issue:'', status:'status' },
  edited: { enterprise:'enterprise_name', image_id:'ai.image_id', sku_id:'sku_id', left:'input_image_hres_url', mid:'ai_output', right:'final_output', user:'last_qc_user', editor:'last_editor_user', fqc:'first_qc_user', lqc:'last_qc_user', issue:'rejected_comments', status:'status', action:'latest_image_action' }
};

let raw=[], group=[], idx=0, mode='qc', user='';
let imagesLoaded = false, loadedCount = 0, imgsToLoadTotal = 0;
const preloadedIndices = new Set();

const PWDS = {"Nand Kishor":"spyne@123","Ranbir Manoranjan":"spyne@123","Nitin Kumar":"spyne@123","Praveen Agarwal":"spyne@123","Raj Tripathi":"spyne@123","Rohit Chauhan":"spyne@123","Ajay Devrani":"spyne@123"};

function _id(id){ return document.getElementById(id); }

/* --- UTILS --- */
function setLoading(show, txt = 'Fetching data…') {
  const strip = _id('loadStrip');
  if (strip) {
    strip.style.display = show ? 'flex' : 'none';
    _id('loadTxt').textContent = txt;
  }
  const startBtn = _id('startBtn');
  if (startBtn) startBtn.disabled = show;
}

function toast(msg, type='ok') {
  const shelf = _id('toastShelf');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  const ic = (type === 'ok') ? '✓' : '⚠';
  t.innerHTML = `<span>${ic}</span><span>${msg}</span>`;
  shelf.appendChild(t);
  setTimeout(() => {
    t.style.animation = 'tOut .2s ease both';
    setTimeout(() => t.remove(), 200);
  }, 2500);
}

// NEW: Shift Boundary Calculation Logic (7 AM - 6:59 AM)
function getShiftBoundaries() {
  const now = new Date();
  const start = new Date(now);
  start.setMinutes(0, 0, 0);
  start.setSeconds(0, 0);
  
  if (now.getHours() < 7) {
    // Before 7 AM: Shift started yesterday at 7 AM
    start.setDate(now.getDate() - 1);
    start.setHours(7);
  } else {
    // After 7 AM: Shift started today at 7 AM
    start.setHours(7);
  }
  
  const end = new Date(start);
  end.setDate(start.getDate() + 1);
  return { start, end };
}

// NEW: Fetch Production Count from Google Sheet
async function fetchProductionCount() {
  if (!user) return;
  try {
    const response = await fetch(DONE_COUNT_URL);
    if (!response.ok) return;
    const csvData = await response.text();
    const boundaries = getShiftBoundaries();
    
    Papa.parse(csvData, {
      header: true,
      complete: res => {
        const userProduction = res.data.filter(row => {
          // Check user name from column 'login user'
          if (row['login user'] !== user) return false;
          
          // Check timestamp column (usually first column or named 'Timestamp')
          const timestampStr = row['Timestamp']; 
          if (!timestampStr) return false;
          
          const entryDate = new Date(timestampStr);
          return entryDate >= boundaries.start && entryDate < boundaries.end;
        });
        
        _id('doneCounter').textContent = `Done: ${userProduction.length}`;
      }
    });
  } catch (err) {
    console.error("Count fetch failed:", err);
  }
}

function doLogin(){
  const name = _id('loginName').value, pw = _id('loginPw').value;
  if(PWDS[name] === pw){
    user = name;
    const avatar = _id('tAvatar');
    if (avatar) avatar.textContent = name.split(' ').map(n => n[0]).join('').toUpperCase();
    const tUser = _id('tUser');
    if (tUser) tUser.textContent = name;
    _id('loginPage').style.display = 'none';
    _id('app').style.display = 'flex';
    setMode('qc');
    fetchProductionCount(); // Fetch count on login
  } else { _id('loginErr').style.display = 'block'; }
}

function doLogout(){ location.reload(); }

function setMode(m){
  mode = m;
  ['tabQC','tabEdit','tabTool'].forEach(id => _id(id).classList.remove('on'));
  _id(m === 'qc' ? 'tabQC' : m === 'edited' ? 'tabEdit' : 'tabTool').classList.add('on');
  exitToSetup();
  const isQc = m === 'qc';
  const qcOnly = _id('contQcOnly');
  const editOnly = _id('contEditOnly');
  if (qcOnly) qcOnly.classList.toggle('hidden', !isQc);
  if (editOnly) editOnly.classList.toggle('hidden', isQc);
  raw = [];
  preloadedIndices.clear();
  updateCount();
  loadData();
}

async function loadData() {
  setLoading(true);
  const url = mode === 'qc' ? QC_URL : EDIT_URL;
  try {
    const response = await fetch(url);
    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
    const csvData = await response.text();
    Papa.parse(csvData, {
      header: true,
      skipEmptyLines: true,
      complete: res => {
        const m = mode === 'qc' ? FMAP.qc : FMAP.edited;
        raw = res.data.map(r => ({
          enterprise: r[m.enterprise] || '',
          image_id: r[m.image_id] || '',
          sku_id: r[m.sku_id] || '',
          left: r[m.left] || '',
          mid: r[m.mid] || '',
          right: r[m.right] || '',
          user: r[m.user] || 'N/A',
          editor: r[m.editor] || 'N/A',
          fqc: r[m.fqc] || 'N/A',
          lqc: r[m.lqc] || 'N/A',
          issue: r[m.issue] || '',
          status: r[m.status] || '',
          action: r['latest_image_action'] || ''
        }));
        fillFilters();
        updateCount();
        setLoading(false);
      },
      error: err => {
        console.error("PapaParse error:", err);
        toast('Error parsing data', 'err');
        setLoading(false);
      }
    });
  } catch (err) {
    console.error("Fetch error:", err);
    toast('Network error - Check Sheet permissions', 'err');
    setLoading(false);
  }
}

function fillFilters(){
  const ents = [...new Set(raw.map(r=>r.enterprise))].sort();
  const qcus = [...new Set(raw.map(r=>r.user))].sort();
  const fqcs = [...new Set(raw.map(r=>r.fqc))].sort();
  const lqcs = [...new Set(raw.map(r=>r.lqc))].sort();
  const editors = [...new Set(raw.map(r=>r.editor))].sort();
  const issues = [...new Set(raw.flatMap(r=>r.issue ? r.issue.split(',') : []))].map(i=>i.trim()).filter(Boolean).sort();

  const populate = (id, list) => {
    const sel = _id(id);
    if (!sel) return;
    const first = sel.options[0].text;
    sel.innerHTML = `<option value="">${first}</option>`;
    list.forEach(v => { if(v && v!=='N/A') sel.innerHTML += `<option value="${v}">${v}</option>`; });
  };

  populate('entFilter', ents);
  populate('qcUFilter', qcus);
  populate('fqcFilter', fqcs);
  populate('lqcFilter', lqcs);
  populate('editorFilter', editors);
  populate('issueFilter', issues);
}

function getFiltered(){
  const ent = _id('entFilter').value;
  const qcu = _id('qcUFilter').value;
  const fqc = _id('fqcFilter').value;
  const lqc = _id('lqcFilter').value;
  const ed = _id('editorFilter').value;
  const is = _id('issueFilter').value;

  return raw.filter(r => {
    const statusVal = (r.status || '').toString().trim().toLowerCase();
    let ok = statusVal === '' || statusVal === 'null';
    if(ent) ok = ok && r.enterprise === ent;
    if(mode === 'qc'){
      if(qcu) ok = ok && r.user === qcu;
    } else {
      if(fqc) ok = ok && r.fqc === fqc;
      if(lqc) ok = ok && r.lqc === lqc;
      if(ed) ok = ok && r.editor === ed;
      if(is) ok = ok && r.issue.includes(is);
    }
    if(mode === 'qc_tool') ok = ok && r.action === 'qc_editingtool';
    else if(mode === 'edited') ok = ok && r.action !== 'qc_editingtool';
    return ok;
  });
}

function updateCount(){
  const filtered = getFiltered();
  const fcount = _id('fcount');
  if (fcount) fcount.textContent = filtered.length.toLocaleString() + ' records';
}

function startReview(){
  group = getFiltered().sort(() => Math.random() - 0.5);
  if(!group.length) return alert('No records to review');
  idx = 0;
  _id('setupPage').style.display = 'none';
  _id('reviewPage').style.display = 'flex';
  showRecord();
  preloadFuture(15);
}

function resetImage(imgId) {
    const img = _id(imgId);
    if (img) {
      img.classList.remove('loaded');
      img.src = "";
    }
}

function checkAllLoaded() {
  if(loadedCount >= imgsToLoadTotal) {
    imagesLoaded = true;
    preloadFuture(10);
  }
}

function preloadFuture(count = 15) {
  for (let i = 1; i <= count; i++) {
    const targetIdx = idx + i;
    if (targetIdx < group.length && !preloadedIndices.has(targetIdx)) {
      const item = group[targetIdx];
      const urls = [item.left, item.mid];
      if (mode !== 'qc') urls.push(item.right || item.mid);
      urls.forEach(url => { if (!url) return; const img = new Image(); img.src = PROXY + url; });
      preloadedIndices.add(targetIdx);
    }
  }
}

function showRecord(){
  const r = group[idx];
  imagesLoaded = false;
  loadedCount = 0;
  imgsToLoadTotal = mode === 'qc' ? 2 : 3;

  const handleFinish = (e) => {
    e.target.classList.add('loaded');
    loadedCount++;
    checkAllLoaded();
  };

  _id('mEnt').textContent = r.enterprise;
  _id('mSku').textContent = r.sku_id;
  _id('mImg').textContent = r.image_id;
  _id('mQcUsers').textContent = r.fqc !== 'N/A' ? `${r.fqc}, ${r.lqc}` : r.user;
  _id('mEditor').textContent = r.editor;
  _id('mEditorWrap').classList.toggle('hidden', mode === 'qc');
  _id('mIssue').textContent = r.issue;
  _id('mIssueWrap').classList.toggle('hidden', !r.issue);
  _id('progLbl').textContent = `Record ${idx+1} of ${group.length}`;
  _id('progFill').style.width = ((idx+1)/group.length*100) + '%';
  
  resetImage('imgL'); resetImage('imgM'); resetImage('imgR');

  ['imgL','imgM','imgR'].forEach(id => {
    const el = _id(id);
    el.onload = handleFinish;
    el.onerror = handleFinish;
  });

  _id('imgL').src = PROXY + r.left;
  _id('imgM').src = PROXY + r.mid;
  if(mode === 'qc'){
    _id('panelR').style.display = 'none';
    _id('imgArea').className = 'img-area two-col';
  } else {
    _id('panelR').style.display = 'flex';
    _id('imgArea').className = 'img-area';
    _id('imgR').src = PROXY + (r.right || r.mid);
  }

  _id('prevBtn').disabled = idx === 0;
  document.querySelectorAll('.issue-cb').forEach(cb => cb.checked = false);
  _id('cbDone').checked = true;
}

function doSubmit(){
  if (!imagesLoaded) {
    toast('Wait to load images then enter', 'warn');
    return;
  }

  const r = group[idx];
  const selectedOptions = Array.from(document.querySelectorAll('.issue-cb:checked'))
                               .map(cb => cb.value);
  
  if (selectedOptions.length === 0) {
      toast('Please select an issue or Done', 'warn');
      return;
  }

  _id('nextBtn').disabled = true;

  const body = new URLSearchParams();
  body.append("entry.890284089", r.enterprise);
  body.append("entry.5932044", [r.fqc, r.lqc, r.user].filter(u => u && u.toLowerCase() !== 'n/a').join(', '));
  body.append("entry.1880389842", r.editor);
  body.append("entry.1139236247", r.sku_id);
  body.append("entry.661750446", r.image_id);
  body.append("entry.1317530325", r.issue);
  body.append("entry.1455673211", r.left);
  body.append("entry.772576827", r.mid);
  body.append("entry.780536997", r.right || r.mid);
  body.append("entry.865196657", user);
  body.append("entry.778698303", selectedOptions.join(", "));

  fetch(FORM_URL, { 
    method: 'POST', 
    mode: 'no-cors', 
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: body.toString() 
  })
    .then(() => {
      _id('nextBtn').disabled = false;
      toast('Submitted successfully');
      fetchProductionCount(); // Update done count after submission
      if(idx < group.length - 1){ idx++; showRecord(); }
      else { alert('Review Finished.'); exitToSetup(); }
    })
    .catch(err => {
      _id('nextBtn').disabled = false;
      toast('Error submitting', 'err');
    });
}

function exitToSetup(){
  _id('reviewPage').style.display = 'none';
  _id('setupPage').style.display = 'flex';
}

function handleLoginEnter(e) {
  if (e.key === 'Enter') { e.preventDefault(); doLogin(); }
}

document.querySelectorAll('.issue-cb').forEach(cb => {
  cb.addEventListener('change', (e) => {
    if (e.target.id === 'cbDone') {
      if (e.target.checked) {
        document.querySelectorAll('.issue-cb:not(#cbDone)').forEach(other => other.checked = false);
      }
    } else {
      if (e.target.checked) {
        _id('cbDone').checked = false;
      } else {
        const anyOthers = Array.from(document.querySelectorAll('.issue-cb:not(#cbDone)')).some(c => c.checked);
        if (!anyOthers) _id('cbDone').checked = true;
      }
    }
  });
});

document.addEventListener('keydown', e => {
  if (_id('reviewPage').style.display === 'flex') {
    if (e.key >= '1' && e.key <= '8') {
      const cb = _id('cb' + e.key);
      if (cb) { cb.checked = !cb.checked; cb.dispatchEvent(new Event('change')); e.preventDefault(); }
    }
    if (e.key === '9') {
       const cb = _id('cbDone');
       cb.checked = !cb.checked;
       cb.dispatchEvent(new Event('change'));
       e.preventDefault();
    }
    if (e.key === 'Enter') { doSubmit(); e.preventDefault(); }
  }
});

_id('loginBtn').onclick = doLogin;
_id('loginName').addEventListener('keydown', handleLoginEnter);
_id('loginPw').addEventListener('keydown', handleLoginEnter);
_id('startBtn').onclick = startReview;
_id('prevBtn').onclick = () => { if(idx > 0) { idx--; showRecord(); } };

['entFilter','qcUFilter','fqcFilter','lqcFilter','editorFilter','issueFilter'].forEach(id => {
  const el = _id(id);
  if (el) el.addEventListener('change', updateCount);
});
</script>
</body>
</html>
